repositories {
    mavenCentral()
}

dependencies {
    api project(':arc3d-core')
    api project(':arc3d-compiler')
    api "org.slf4j:slf4j-api:${slf4j_version}"
    compileOnly "org.lwjgl:lwjgl:${lwjgl_version}"
    testImplementation "org.slf4j:slf4j-simple:${slf4j_version}"

    testImplementation "org.lwjgl:lwjgl:${lwjgl_version}"
    testRuntimeOnly "org.lwjgl:lwjgl:${lwjgl_version}:${rootProject.ext.lwjglNatives}"
}

test {
    failOnNoDiscoveredTests = false
}

publishing {
    def lwjglVersion = getProperty('lwjgl_version')
    publications {
        mavenJava(MavenPublication) {
            from components.java

            pom {
                name = 'Arc3D Engine'
                description = 'The graphics engine of Arc3D, which provides API-agnostic GPU rendering infrastructure.'
                url = project.arc3d_url
                scm {
                    connection = project.arc3d_scm_connection
                    developerConnection = project.arc3d_scm_developerConnection
                    url = project.arc3d_scm_url
                }
                issueManagement {
                    system = project.arc3d_issueManagement_system
                    url = project.arc3d_issueManagement_url
                }
                licenses {
                    license {
                        name = 'LGPL-3.0-or-later'
                        url = 'https://www.gnu.org/licenses/lgpl-3.0.en.html'
                        distribution = 'repo'
                    }
                }
                developers {
                    developer {
                        id = project.arc3d_developer_id
                        name = project.arc3d_developer_name
                        email = project.arc3d_developer_email
                        url = project.arc3d_developer_url
                    }
                }
                withXml {
                    def root = asNode()
                    root.dependencyManagement.each { root.remove(it) }
                    root.dependencies.each { root.remove(it) }
                    def dependenciesNode = root.appendNode('dependencies')
                    configurations.implementation.allDependencies.each {
                        if (it.group == 'org.lwjgl') return
                        def dependencyNode = dependenciesNode.appendNode('dependency')
                        dependencyNode.appendNode('groupId', it.group)
                        dependencyNode.appendNode('artifactId', it.name)
                        dependencyNode.appendNode('version', it.version)
                        dependencyNode.appendNode('scope', 'compile')
                    }
                    configurations.compileOnly.allDependencies.each {
                        if (it.group == 'org.lwjgl') return
                        def dependencyNode = dependenciesNode.appendNode('dependency')
                        dependencyNode.appendNode('groupId', it.group)
                        dependencyNode.appendNode('artifactId', it.name)
                        dependencyNode.appendNode('version', it.version)
                        dependencyNode.appendNode('scope', 'provided')
                    }
                    configurations.runtimeOnly.allDependencies.each {
                        if (it.group == 'org.lwjgl') return
                        def dependencyNode = dependenciesNode.appendNode('dependency')
                        dependencyNode.appendNode('groupId', it.group)
                        dependencyNode.appendNode('artifactId', it.name)
                        dependencyNode.appendNode('version', it.version)
                        dependencyNode.appendNode('scope', 'runtime')
                    }
                }
            }
        }
    }
}

signing {
    useGpgCmd()
    sign(publishing.publications["mavenJava"])
}